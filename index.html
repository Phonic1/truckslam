<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edie's Food Truck Slam</title>
    <style>
        :root {
            --primary-color: #ff1493; /* Deep Pink */
            --road-color: #333;
            --bg-color: #FF69B4; /* Hot Pink */
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Arial Black', Gadget, sans-serif;
            user-select: none;
        }

        /* --- INTRO ANIMATION --- */
        #intro-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 5000; color: white;
            transition: opacity 0.8s ease;
        }

        .slam-text {
            font-size: 85px; 
            font-weight: 900; 
            color: var(--primary-color); /* Kept the Pink */
            /* Added a white stroke to make the pink look sharp on black */
            -webkit-text-stroke: 3px white; 
            text-shadow: 5px 5px 15px rgba(255, 20, 147, 0.5);
            animation: slam-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            text-align: center; 
            line-height: 0.9;
        }

        @keyframes slam-in {
            0% { transform: scale(8) rotate(15deg); opacity: 0; }
            80% { transform: scale(1) rotate(-5deg); opacity: 1; }
            100% { transform: scale(1.1) rotate(0deg); }
        }

        #start-btn {
            margin-top: 50px; padding: 25px 50px; font-size: 30px;
            background: white; color: var(--primary-color);
            border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 10px 0 #ddd; font-weight: bold;
        }

        /* --- UI BUTTONS --- */
        .ui-btn {
            position: absolute;
            padding: 15px 25px;
            font-size: 20px;
            font-weight: bold;
            background: white;
            color: var(--primary-color);
            border: 4px solid var(--primary-color);
            border-radius: 15px;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 5px 0 #ddd;
        }

        #report-btn { top: 20px; right: 20px; }

        /* --- CONTROL PANEL --- */
        #control-panel {
            position: absolute; top: 100px; left: -220px; width: 200px;
            background: white; padding: 20px; border-radius: 0 20px 20px 0;
            box-shadow: 5px 0 15px rgba(0,0,0,0.3);
            transition: left 0.3s ease; z-index: 1500;
            border: 3px solid var(--primary-color);
        }
        #control-panel.open { left: 0; }
        #panel-toggle {
            position: absolute; right: -50px; top: -3px; width: 50px; height: 60px;
            background: white; border: 3px solid var(--primary-color); border-left: none;
            border-radius: 0 15px 15px 0; display: flex; align-items: center;
            justify-content: center; cursor: pointer; font-size: 25px;
        }

        /* --- REPORT MODAL --- */
        #report-modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            width: 80%; height: 70%;
            background: white; border: 10px solid var(--primary-color);
            border-radius: 30px; z-index: 4000;
            display: none; flex-direction: column;
            padding: 30px; opacity: 0;
            transition: all 0.3s ease;
        }

        #report-modal.active { display: flex; opacity: 1; transform: translate(-50%, -50%) scale(1); }

        #food-grid {
            display: flex; flex-wrap: wrap; gap: 15px;
            overflow-y: auto; background: #fff0f5;
            padding: 20px; border-radius: 15px; flex-grow: 1;
            align-content: flex-start;
        }

        .food-report-item {
            font-size: 50px; background: white; padding: 10px;
            border-radius: 10px; box-shadow: 0 4px 0 #ddd;
        }

        #close-report {
            position: relative; margin-top: 20px; align-self: flex-end;
            background: var(--primary-color); color: white; border-color: white;
        }

        /* --- GAME ELEMENTS --- */
        .road {
            position: absolute; 
            top: 50%; 
            transform: translateY(-50%);
            width: 100%; 
            height: 300px;
            background-color: var(--road-color);
            border-top: 10px solid #fff; 
            border-bottom: 10px solid #fff;
            box-sizing: border-box;
        }
        .lane-line { 
            position: absolute; 
            top: 50%; 
            width: 100%; 
            border-top: 8px dashed rgba(255, 255, 255, 0.4); 
        }
        
        .truck { 
            position: absolute; 
            font-size: 100px; 
            line-height: 100px;
            cursor: pointer; 
            z-index: 10;
        }
        
        .food-popup {
            position: absolute; top: -50px; font-size: 70px;
            background: white; border-radius: 50%; padding: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            animation: bounce 0.4s infinite alternate;
            z-index: 20;
        }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-20px); } }

        #cursor {
            position: absolute; width: 70px; height: 70px; font-size: 60px;
            pointer-events: none; z-index: 6000;
            filter: drop-shadow(3px 3px 2px rgba(0,0,0,0.3));
        }
    </style>
</head>
<body>

<div id="intro-overlay">
    <div class="slam-text">EDIE'S<br>FOOD TRUCK<br>SLAM!</div>
    <button id="start-btn">START GAME! 🚚</button>
</div>

<button id="report-btn" class="ui-btn">🍕 MY FOODS</button>

<div id="control-panel">
    <div id="panel-toggle">⚙️</div>
    <label style="font-weight:bold; color:var(--primary-color)">Truck Speed</label>
    <!-- Updated min to 0.5 and added step for finer control -->
    <input type="range" id="speed-slider" min="0.5" max="25" step="0.5" value="5" style="width:100%; accent-color:var(--primary-color);">
</div>

<div id="report-modal">
    <h1 style="color:var(--primary-color); text-align:center;">Edie's Collection</h1>
    <div id="food-grid"></div>
    <button id="close-report" class="ui-btn">BACK TO GAME ➔</button>
</div>

<div id="game-container">
    <div class="road" id="main-road"><div class="lane-line"></div></div>
    <div id="cursor">🖐️</div>
</div>

<script>
    const container = document.getElementById('game-container');
    const cursor = document.getElementById('cursor');
    const intro = document.getElementById('intro-overlay');
    const startBtn = document.getElementById('start-btn');
    const reportBtn = document.getElementById('report-btn');
    const reportModal = document.getElementById('report-modal');
    const closeReport = document.getElementById('close-report');
    const foodGrid = document.getElementById('food-grid');
    const speedSlider = document.getElementById('speed-slider');
    const panel = document.getElementById('control-panel');
    const panelToggle = document.getElementById('panel-toggle');
    const road = document.getElementById('main-road');
    
    let trucks = [];
    let foodCollected = [];
    let speedMultiplier = 5;
    const truckEmojis = ['🚚', '🚛', '🚐', '🚌']; 
    const foodEmojis = ['🍕', '🍔', '🌮', '🍦', '🍩', '🍟', '🍭', '🍉', '🍓', '🥨', '🌭', '🥞'];
    
    let cursorX = window.innerWidth / 2;
    let cursorY = window.innerHeight / 2;
    let gamepadIndex = null;
    let gameActive = false;
    let modalOpen = false;

    startBtn.onclick = () => {
        intro.style.opacity = '0';
        setTimeout(() => { intro.style.display = 'none'; gameActive = true; }, 800);
    };

    reportBtn.onclick = showReport;
    closeReport.onclick = hideReport;
    panelToggle.onclick = () => panel.classList.toggle('open');
    
    // Updated to parseFloat to support decimal speeds (twice as slow)
    speedSlider.oninput = (e) => speedMultiplier = parseFloat(e.target.value);

    function showReport() {
        modalOpen = true;
        foodGrid.innerHTML = '';
        foodCollected.forEach(emoji => {
            const item = document.createElement('div');
            item.className = 'food-report-item';
            item.innerHTML = emoji;
            foodGrid.appendChild(item);
        });
        reportModal.style.display = 'flex';
        setTimeout(() => reportModal.classList.add('active'), 10);
    }

    function hideReport() {
        modalOpen = false;
        reportModal.classList.remove('active');
        setTimeout(() => reportModal.style.display = 'none', 300);
    }

    window.addEventListener("gamepadconnected", (e) => gamepadIndex = e.gamepad.index);

    function spawnTruck() {
        if (!gameActive || modalOpen) return;

        const roadRect = road.getBoundingClientRect();
        const truckHeight = 100;
        
        // ROAD LOGIC: Keep them perfectly on the pavement
        const minY = roadRect.top + 20;
        const maxY = roadRect.bottom - truckHeight - 20;
        const randomY = minY + (Math.random() * (maxY - minY));

        const truckData = {
            x: window.innerWidth + 250,
            y: randomY,
            baseSpeed: (Math.random() * 0.4) + 0.6,
            emoji: truckEmojis[Math.floor(Math.random() * truckEmojis.length)],
            food: foodEmojis[Math.floor(Math.random() * foodEmojis.length)],
            isOpen: false,
            element: document.createElement('div')
        };

        truckData.element.className = 'truck';
        truckData.element.innerHTML = truckData.emoji;
        truckData.element.style.left = truckData.x + 'px';
        truckData.element.style.top = truckData.y + 'px';
        truckData.element.onclick = () => openTruck(truckData);
        container.appendChild(truckData.element);
        trucks.push(truckData);
    }

    function openTruck(truck) {
        if (truck.isOpen) return;
        truck.isOpen = true;
        foodCollected.push(truck.food);
        const foodItem = document.createElement('div');
        foodItem.className = 'food-popup';
        foodItem.innerHTML = truck.food;
        truck.element.appendChild(foodItem);
        truck.element.style.transition = "transform 0.1s";
        truck.element.style.transform = "scale(1.4)";
        setTimeout(() => truck.element.style.transform = "scale(1)", 100);
    }

    function update() {
        if (gameActive) {
            if (gamepadIndex !== null) {
                const gp = navigator.getGamepads()[gamepadIndex];
                if (gp) {
                    const moveX = gp.axes[0];
                    const moveY = gp.axes[1];
                    if (Math.abs(moveX) > 0.1) cursorX += moveX * 18;
                    if (Math.abs(moveY) > 0.1) cursorY += moveY * 18;
                    cursorX = Math.max(0, Math.min(window.innerWidth - 70, cursorX));
                    cursorY = Math.max(0, Math.min(window.innerHeight - 70, cursorY));
                    cursor.style.left = cursorX + 'px';
                    cursor.style.top = cursorY + 'px';
                    cursor.style.display = 'block';
                    if (gp.buttons.some(b => b.pressed)) checkCollisions();
                }
            } else { cursor.style.display = 'none'; }

            if (!modalOpen) {
                for (let i = trucks.length - 1; i >= 0; i--) {
                    const t = trucks[i];
                    t.x -= (t.baseSpeed * speedMultiplier);
                    t.element.style.left = t.x + 'px';
                    if (t.x < -300) {
                        container.removeChild(t.element);
                        trucks.splice(i, 1);
                    }
                }
            }
        }
        requestAnimationFrame(update);
    }

    function checkCollisions() {
        if (modalOpen) {
            const bRect = closeReport.getBoundingClientRect();
            if (cursorX+35 > bRect.left && cursorX+35 < bRect.right && cursorY+35 > bRect.top && cursorY+35 < bRect.bottom) {
                hideReport();
            }
            return;
        }

        trucks.forEach(truck => {
            const rect = truck.element.getBoundingClientRect();
            if (cursorX+35 > rect.left && cursorX+35 < rect.right && cursorY+35 > rect.top && cursorY+35 < rect.bottom) {
                openTruck(truck);
            }
        });
        
        const rRect = reportBtn.getBoundingClientRect();
        if (cursorX+35 > rRect.left && cursorX+35 < rRect.right && cursorY+35 > rRect.top && cursorY+35 < rRect.bottom) {
            showReport();
        }
    }

    function spawnLoop() {
        spawnTruck();
        let delay = 3500 / (speedMultiplier * 0.2 + 1);
        setTimeout(spawnLoop, Math.max(700, delay));
    }

    spawnLoop();
    update();
</script>

</body>
</html>
